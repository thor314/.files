# NOTE: must use SPACES not TABS
# help: https://github.com/anishathalye/dotbot#configuration
- defaults:
     link:
       relink: true # update symlinks
       force: true # update symlinks
         # create: true # create any necessary directories

- clean: ['~'] # clean dead symlinks

# automate new system mkdirs
- create: 
    - ~/archive
    - ~/img
    - ~/fun
    - ~/img
    - ~/vid
    - ~/py/play
    - ~/r/play
    - ~/tmp/bak
    - ~/.trash
    - ~/Downloads/book
    - ~/Downloads/delete_soon
    - ~/Downloads/invoice
    - ~/Downloads/official
    - ~/Downloads/paper
    - ~/Downloads/tax
    - ~/.config/Code/User

- link:
    ~/.config/leftwm: leftwm
      # ~/.config/nvim: nvim
    ~/.local/share/fonts: fonts
    ~/.files/zsh.d/.zshrc: zsh.d/zshrc # maybe redundant
    ~/.zsh.d:
    ~/.config/fish: fish
    ~/.gitconfig:
    ~/.config/helix: helix
    # ~/.vimrc:
    # ~/.share/bin: ~/bin/share
    # ~/.local/bin: ~/bin/local
    # ~/.cargo/bin: ~/bin/cargo
    ~/.cargo/cargo-generate.toml: cargo-generate.toml
    ~/.config/Code/User/keybindings.json: vscode/keybindings.json
    ~/.config/Code/User/settings.json: vscode/settings.json
    ~/.config/Code/User/snippets: vscode/snippets
    ~/.config/alacritty: alacritty
    ~/.profile:  
    ~/.xprofile:
    ~/.config/zellij: zellij
